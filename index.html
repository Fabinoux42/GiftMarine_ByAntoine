<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4 mois avec Marine 💌</title>
    <link rel="icon"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💌</text></svg>">

    <!-- Thème de base (mot de passe, accueil, roue, fin) -->
    <link rel="stylesheet" href="css/themes/rose-violet.css">
    <!-- Thèmes contextuels (activés via body[data-theme] par js/theme.js) -->
    <link rel="stylesheet" href="css/themes/simulator.css">
    <link rel="stylesheet" href="css/themes/quiz.css">
    <link rel="stylesheet" href="css/themes/kawaii.css">
    <link rel="stylesheet" href="css/themes/africa.css">
    <!-- Composants & layout (ne pas modifier pour changer les couleurs) -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!--
  Éléments persistants (jauge, guide, toolbar, hearts).
  Injectés depuis shared/chrome.html par app.js.
-->
<div data-include="shared/chrome.html"></div>

<!--
  Écran de mot de passe — toujours visible au 1er chargement.
  Injecté depuis sections/lock.html.
-->
<div data-include="sections/lock.html"></div>

<!--
  Contenu principal — masqué jusqu'au bon mot de passe.
  Les sections sont injectées dans l'ordre du parcours.
-->
<div id="main-content" class="hidden">
    <div data-include="sections/home.html"></div>
    <div data-include="sections/impossible.html"></div>
    <div data-include="sections/wheel.html"></div>
    <div data-include="sections/simulator.html"></div>
    <div data-include="sections/hangman.html"></div>
    <div data-include="sections/quizzes.html"></div>
    <div data-include="sections/ending.html"></div>
</div>

<!--
  Scripts — ordre strict requis :
  données → stockage → état → son → modules UI → thème → écrans → point d'entrée
-->
<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/state.js"></script>
<script src="js/sound.js"></script>
<script src="js/gauge.js"></script>
<script src="js/guide.js"></script>
<script src="js/navigation.js"></script>
<script src="js/theme.js"></script>
<script src="js/password.js"></script>
<script src="js/impossible.js"></script>
<script src="js/wheel.js"></script>
<script src="js/simulator.js"></script>
<script src="js/hangman.js"></script>
<script src="js/quiz.js"></script>
<script src="js/ending.js"></script>
<script src="js/app.js"></script>

</body>
</html>
